# Astartes Primaris — Cloud Build Pipeline
# Triggered on push to main. Builds all service images, pushes to
# Artifact Registry, and deploys to Cloud Run.
#
# Substitutions (set in trigger config):
#   _REGION       — GCP region (default: us-central1)
#   _ENVIRONMENT  — dev / staging / prod (default: dev)

substitutions:
  _REGION: us-central1
  _ENVIRONMENT: dev

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── Build images in parallel ──────────────────────────────
  - id: build-primarch
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/primarch:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/primarch:latest
      - services/primarch
    waitFor: ['-']

  - id: build-aurum
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/aurum:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/aurum:latest
      - services/aurum
    waitFor: ['-']

  - id: build-auspex
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/auspex:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/auspex:latest
      - services/auspex
    waitFor: ['-']

  - id: build-forge
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/forge:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/forge:latest
      - services/forge
    waitFor: ['-']

  - id: build-registry
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/registry:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/registry:latest
      - services/registry
    waitFor: ['-']

  # codex and logis: no source code yet, uncomment when implemented
  # - id: build-codex
  # - id: build-logis

  # ── Push images ───────────────────────────────────────────
  - id: push-primarch
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/primarch"]
    waitFor: [build-primarch]

  - id: push-aurum
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/aurum"]
    waitFor: [build-aurum]

  - id: push-auspex
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/auspex"]
    waitFor: [build-auspex]

  - id: push-forge
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/forge"]
    waitFor: [build-forge]

  - id: push-registry
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/registry"]
    waitFor: [build-registry]

  # ── Deploy to Cloud Run ───────────────────────────────────
  - id: deploy-primarch
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - primarch-${_ENVIRONMENT}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/primarch:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --port=8401
      - --allow-unauthenticated
      - --set-env-vars=ENVIRONMENT=${_ENVIRONMENT},ADMIN_EMAILS=dave@janzend.com
      - --set-secrets=GOOGLE_CLIENT_ID=google-client-id:latest,PRIMARCH_AUTH_PASSWORD=primarch-auth-password:latest,ALPACA_API_KEY=alpaca-api-key:latest,ALPACA_SECRET_KEY=alpaca-secret-key:latest,CLAUDE_API_KEY=claude-api-key:latest,PRIMARCH_SERVICE_TOKEN=primarch-service-token:latest,PRIMARCH_DB_URL=primarch-db-url:latest,CFO_ENGINE_URL=cfo-engine-url:latest,CFO_ENGINE_TOKEN=firefly-access-token:latest,MONARCH_TOKEN=monarch-token:latest,PLAID_CLIENT_ID=plaid-client-id:latest,PLAID_SECRET=plaid-secret:latest,PLAID_ENV=plaid-env:latest,PLAID_TOKEN_ENC_KEY=plaid-token-enc-key:latest,TASTYTRADE_CLIENT_ID=tastytrade-client-id:latest,TASTYTRADE_REFRESH_TOKEN=tastytrade-refresh-token:latest
      - --network=default
      - --subnet=default
      - --vpc-egress=private-ranges-only
      - --clear-vpc-connector
      - --quiet
    waitFor: [push-primarch]

  - id: deploy-aurum
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - aurum-${_ENVIRONMENT}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/aurum:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --set-env-vars=ENVIRONMENT=${_ENVIRONMENT},PRIMARCH_URL=https://primarch-${_ENVIRONMENT}-cc3eartpca-uc.a.run.app
      - --set-secrets=PRIMARCH_SERVICE_TOKEN=primarch-service-token:latest
      - --allow-unauthenticated
      - --quiet
    waitFor: [push-aurum]

  - id: deploy-auspex
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - auspex-${_ENVIRONMENT}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/auspex:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --port=8300
      - --no-cpu-throttling
      - --min-instances=1
      - --set-env-vars=^~^ENVIRONMENT=${_ENVIRONMENT}~AUSPEX_PROVIDER=alpaca~ALPACA_FEED=iex~AUSPEX_SYMBOLS=SPY,AAPL,MSFT,GOOGL,AMZN,NVDA,META,TSLA~LIBRARIUM_HOST=10.79.0.3~LIBRARIUM_DB=librarium~LIBRARIUM_USER=librarium~AUSPEX_BACKFILL_DAYS=30~VOX_ENABLED=false
      - --set-secrets=ALPACA_API_KEY=alpaca-api-key:latest,ALPACA_SECRET_KEY=alpaca-secret-key:latest,LIBRARIUM_PASSWORD=librarium-db-password-dev:latest
      - --network=default
      - --subnet=default
      - --vpc-egress=private-ranges-only
      - --clear-vpc-connector
      - --quiet
    waitFor: [push-auspex]

  - id: deploy-forge
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - jobs
      - deploy
      - forge-${_ENVIRONMENT}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/forge:${SHORT_SHA}
      - --region=${_REGION}
      - --set-env-vars=ENVIRONMENT=${_ENVIRONMENT}
      - --quiet
    waitFor: [push-forge]

  - id: deploy-registry
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - registry-${_ENVIRONMENT}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/registry:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --port=8701
      - --min-instances=1
      - --max-instances=3
      - --memory=512Mi
      - --allow-unauthenticated
      - --set-env-vars=^~^ENVIRONMENT=${_ENVIRONMENT}~ADMIN_EMAILS=dave@janzend.com~LIBRARIUM_HOST=10.79.0.3~LIBRARIUM_DB=librarium~LIBRARIUM_USER=librarium~REGISTRY_GCS_BUCKET=astartes-primaris-registry-bundles~DISCORD_CHANNEL_MARKETPLACE=1491106548175343667~DISCORD_CHANNEL_MARKETPLACE_ALERTS=1491106675527123195
      - --set-secrets=REGISTRY_MASTER_TOKEN=registry-master-token:latest,DISCORD_BOT_TOKEN=discord-bot-token:latest,PNL_REPORT_HMAC_SECRET=pnl-hmac-secret:latest,LIBRARIUM_PASSWORD=librarium-db-password-${_ENVIRONMENT}:latest,GOOGLE_CLIENT_ID=google-client-id:latest
      - --vpc-connector=astartes-vpc-${_ENVIRONMENT}
      - --vpc-egress=private-ranges-only
      - --quiet
    waitFor: [push-registry]


images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/primarch:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/primarch:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/aurum:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/aurum:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/auspex:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/auspex:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/forge:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/forge:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/registry:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/astartes-primaris/registry:latest
